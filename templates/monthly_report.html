<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preliminary MTD VILC Results | P&P</title>
  <link rel="stylesheet" href="{{ css_path }}">
</head>
<body>
  <div class="report-page">
    <header class="hero">
      <div class="hero-copy">
        <div class="hero-meta">{{ month_display }}, {{ year_display }}</div>
        <div class="hero-title">Preliminary MTD<br>VILC Results | P&amp;P</div>
        <div class="hero-subtitle">{{ report_subtitle }}</div>
      </div>
      <div class="hero-logo-mark">
        <div class="hero-logo-icon">▮▮▮</div>
        <div class="hero-logo-text">PSP<br>TECH</div>
      </div>
    </header>

    <section class="report-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD/YTD VIC P&amp;P vs BU</div>
      </div>
      <div class="chart-row two-col">
        <figure class="chart-card">
          <img src="{{ mtd_vic_pp_mtd }}" alt="MTD VIC P&amp;P vs BU">
        </figure>
        <figure class="chart-card">
          <img src="{{ mtd_vic_pp_ytd }}" alt="YTD VIC P&amp;P vs BU">
        </figure>
      </div>
    </section>

    <section class="report-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD/YTD VIC Price vs BU</div>
      </div>
      <div class="chart-row two-col">
        <figure class="chart-card">
          <img src="{{ mtd_vic_price_mtd }}" alt="MTD VIC Price vs BU">
        </figure>
        <figure class="chart-card">
          <img src="{{ mtd_vic_price_ytd }}" alt="YTD VIC Price vs BU">
        </figure>
      </div>
    </section>

    <section class="report-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD vs BGT category by Zone ($Mio)</div>
      </div>
      <div class="chart-row two-col">
        <figure class="chart-card">
          <img src="{{ mtd_category_mtd }}" alt="MTD package level breakdown">
        </figure>
        <figure class="chart-card">
          <img src="{{ mtd_category_ytd }}" alt="YTD package level breakdown">
        </figure>
      </div>
    </section>

    <section class="report-section matrix-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD vs BGT category by Zone ($Mio)</div>
      </div>
      <div class="chart-row full-width">
        <figure class="chart-card zone-table-card">
          <img src="{{ mtd_zone_table }}" alt="Package chart by zone">
        </figure>
      </div>
    </section>

    <footer class="report-footer">
      <div class="footer-left">ABInBev</div>
      <div class="footer-center">Generated report</div>
      <div class="footer-right">Powered by PSP TECH</div>
    </footer>
  </div>
</body>
</html>
