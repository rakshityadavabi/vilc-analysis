<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preliminary MTD VILC Results | P&P</title>
  <link rel="stylesheet" href="{{ css_path }}">
</head>
<body>
  <div class="report-page">
    <header class="report-banner">
      <div class="report-period">{{ month_display }}, {{ year_display }}</div>
      <img class="header-art" src="../header.png" alt="Report header">
    </header>

    <section class="report-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD/YTD VIC P&amp;P vs BU</div>
      </div>
      <div class="chart-row two-col">
        <figure class="chart-card">
          <img src="{{ mtd_vic_pp_mtd }}" alt="MTD VIC P&amp;P vs BU">
        </figure>
        <figure class="chart-card">
          <img src="{{ mtd_vic_pp_ytd }}" alt="YTD VIC P&amp;P vs BU">
        </figure>
      </div>
    </section>

    <section class="report-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD/YTD VIC Price vs BU</div>
      </div>
      <div class="chart-row two-col">
        <figure class="chart-card">
          <img src="{{ mtd_vic_price_mtd }}" alt="MTD VIC Price vs BU">
        </figure>
        <figure class="chart-card">
          <img src="{{ mtd_vic_price_ytd }}" alt="YTD VIC Price vs BU">
        </figure>
      </div>
    </section>

    <section class="report-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD vs BGT category by Zone ($Mio)</div>
      </div>
      <div class="chart-row two-col">
        <figure class="chart-card">
          <img src="{{ mtd_category_mtd }}" alt="MTD package level breakdown">
        </figure>
        <figure class="chart-card">
          <img src="{{ mtd_category_ytd }}" alt="YTD package level breakdown">
        </figure>
      </div>
    </section>

    <section class="report-section matrix-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD vs BGT category by Zone ($Mio)</div>
      </div>
      <div class="chart-row full-width">
        <figure class="chart-card zone-table-card">
          <img src="{{ mtd_zone_table }}" alt="Package chart by zone">
        </figure>
      </div>
    </section>

    <section class="report-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD/YTD VIC Performance vs BU</div>
      </div>
      <div class="chart-row two-col">
        <figure class="chart-card">
          <img src="{{ mtd_perf_mtd }}" alt="MTD VIC Performance vs BU">
        </figure>
        <figure class="chart-card">
          <img src="{{ mtd_perf_ytd }}" alt="YTD VIC Performance vs BU">
        </figure>
      </div>
    </section>

    <section class="report-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD/YTD VIC Performance by package</div>
      </div>
      <div class="chart-row two-col">
        <figure class="chart-card">
          <img src="{{ mtd_perf_category_mtd }}" alt="MTD VIC Performance by package">
        </figure>
        <figure class="chart-card">
          <img src="{{ mtd_perf_category_ytd }}" alt="YTD VIC Performance by package">
        </figure>
      </div>
    </section>

    <section class="report-section matrix-section">
      <div class="section-title-wrap">
        <div class="section-divider"></div>
        <div class="section-pill">MTD vs BGT performance category by Zone ($Mio)</div>
      </div>
      <div class="chart-row full-width">
        <figure class="chart-card zone-table-card">
          <img src="{{ mtd_perf_zone_table }}" alt="Performance category by zone">
        </figure>
      </div>
    </section>

    <footer class="report-footer">
      <img class="footer-art" src="../Footer.png" alt="Report footer">
    </footer>
  </div>
</body>
</html>
